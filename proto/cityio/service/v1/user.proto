syntax = "proto3";

package cityio.service.v1;

import "cityio/entity/v1/common.proto";
import "cityio/entity/v1/user.proto";
import "cityio/entity/v1/bag.proto";

message RegisterRequest {
  string email = 1;
  string username = 2;
  string password = 3;
}
message RegisterResponse {
  cityio.entity.v1.UserId user_id = 1;
  string token = 2;
}

message LoginRequest {
  string identifier = 1;
  string password = 2;
}
message LoginResponse {
  string token = 1;
  cityio.entity.v1.User user = 2;
}

message GetUserRequest {
  cityio.entity.v1.UserId user_id = 1;
}
message GetUserResponse {
  cityio.entity.v1.User user = 1;
}

message DeleteUserRequest {
  cityio.entity.v1.UserId user_id = 1;
}
message DeleteUserResponse {}

message StreamStateRequest {}

// StreamStateResponse wraps an EntityBag pushed to a client whenever state changes.
message StreamStateResponse {
  cityio.entity.v1.EntityBag entities = 1;
}

// UserService manages player accounts and the per-user resource stream.
service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc StreamState(StreamStateRequest) returns (stream StreamStateResponse);
}
