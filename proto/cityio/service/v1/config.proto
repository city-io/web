syntax = "proto3";

package cityio.service.v1;

import "cityio/entity/v1/common.proto";
import "google/protobuf/duration.proto";

// ResourceAmount is a one-shot amount (e.g. a build cost).
message ResourceAmount {
  string resource = 1;
  int64 amount = 2;
}

// ResourceRate is an ongoing flow (e.g. production per day).
message ResourceRate {
  string resource = 1;
  cityio.entity.v1.Rate rate = 2;
}

message BuildingLevelStats {
  int32 level = 1;
  repeated ResourceAmount cost = 2;
  google.protobuf.Duration construction_time = 3;
  repeated ResourceRate production = 4;
  double population = 5;
}

message BuildingConfig {
  cityio.entity.v1.BuildingType type = 1;
  repeated BuildingLevelStats levels = 2;
}

message GetGameConfigRequest {}

message GetGameConfigResponse {
  int32 map_size = 1;
  int32 city_size = 2;
  int32 vision_radius = 3;
  google.protobuf.Duration building_tick = 4;
  repeated BuildingConfig buildings = 5;
  google.protobuf.Duration city_tick = 6;
}

service ConfigService {
  rpc GetGameConfig(GetGameConfigRequest) returns (GetGameConfigResponse);
}
