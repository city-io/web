syntax = "proto3";

package cityio.service.v1;

import "cityio/entity/v1/common.proto";
import "cityio/entity/v1/city.proto";
import "cityio/entity/v1/bag.proto";

message GetCityRequest {
  cityio.entity.v1.CityId city_id = 1;
}
message GetCityResponse {
  cityio.entity.v1.City city = 1;
}

message CreateCityRequest {
  cityio.entity.v1.CityType type = 1;
  optional cityio.entity.v1.UserId owner = 2;
  string name = 3;
  int32 size = 4;
}
message CreateCityResponse {
  cityio.entity.v1.City city = 1;
}

message ListCitiesRequest {}
message ListCitiesResponse {
  repeated cityio.entity.v1.CityId city_ids = 1;
  cityio.entity.v1.EntityBag entities = 2;
}

// CityService creates and reads cities.
service CityService {
  rpc GetCity(GetCityRequest) returns (GetCityResponse);
  rpc CreateCity(CreateCityRequest) returns (CreateCityResponse);
  rpc ListCities(ListCitiesRequest) returns (ListCitiesResponse);
}
